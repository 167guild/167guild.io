version: '3'

vars:
  COMPOSE_FILE: docker-compose.yml
  PRODUCTION_COMPOSE_FILE: deploy/production/docker-compose.production.yml
  PRODUCTION_ENV_FILE: .env.production
  COMPOSE_CMD: docker compose --env-file .env
  COMPOSE_PRODUCTION_CMD: docker compose --env-file {{.PRODUCTION_ENV_FILE}} -f {{.COMPOSE_FILE}} -f {{.PRODUCTION_COMPOSE_FILE}}

tasks:
  help:
    desc: Show available development tasks
    cmds:
      - task --list

  guild:
    desc: Run guild platform CLI
    cmds:
      - bash ./guild {{.CLI_ARGS}}

  init:
    desc: Initialize local development environment
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "✅ Created .env from .env.example"
        else
          echo "ℹ️ .env already exists; leaving it unchanged"
        fi
      - docker compose --env-file .env config
      - echo "✅ Local environment scaffold is ready"

  lint:
    desc: Run repository lint checks
    cmds:
      - |
        set -e
        while IFS= read -r -d '' file; do
          bash -n "$file"
        done < <(find scripts deploy/scripts .devcontainer -type f -name '*.sh' -print0)
      - docker compose --env-file .env.example config >/dev/null
      - docker compose --env-file deploy/examples/.env.production.example -f {{.COMPOSE_FILE}} -f {{.PRODUCTION_COMPOSE_FILE}} config >/dev/null
      - |
        if command -v shellcheck >/dev/null 2>&1; then
          find scripts deploy/scripts .devcontainer -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
        else
          echo "ℹ️ shellcheck not installed; skipping shellcheck pass"
        fi
      - echo "✅ Lint checks complete"

  format:
    desc: Format repository files
    cmds:
      - |
        if command -v shfmt >/dev/null 2>&1; then
          find scripts deploy/scripts .devcontainer -type f -name '*.sh' -print0 | xargs -0 -r shfmt -w
          echo "✅ Formatted shell scripts with shfmt"
        else
          echo "❌ shfmt is required for task format. Install shfmt or use the Dev Container."
          exit 1
        fi

  up:
    desc: Start local development stack
    preconditions:
      - sh: test -f .env
        msg: ".env is required. Run 'task init' first."
    cmds:
      - '{{.COMPOSE_CMD}} up -d --remove-orphans'

  down:
    desc: Stop local development stack
    preconditions:
      - sh: test -f .env
        msg: ".env is required. Run 'task init' first."
    cmds:
      - '{{.COMPOSE_CMD}} down --remove-orphans'

  backup:
    desc: Back up PostgreSQL, Wiki.js data, and deployment config
    cmds:
      - bash scripts/backup/backup.sh

  restore:
    desc: Restore application data from a backup archive
    cmds:
      - bash scripts/restore/restore.sh {{.BACKUP_DIR}}

  # Keep deploy as a stable entrypoint for future multi-environment targets.
  deploy:
    desc: Deploy the stack using production configuration
    cmds:
      - task deploy:production

  'deploy:production':
    desc: Validate production config and deploy containers
    preconditions:
      - sh: test -f {{.PRODUCTION_ENV_FILE}}
        msg: ".env.production is required. See deploy/README.md and deploy/examples/.env.production.example"
      - sh: test -f {{.PRODUCTION_COMPOSE_FILE}}
        msg: "{{.PRODUCTION_COMPOSE_FILE}} is required."
    cmds:
      - bash deploy/scripts/validate-env.sh {{.PRODUCTION_ENV_FILE}}
      - '{{.COMPOSE_PRODUCTION_CMD}} config >/dev/null'
      - '{{.COMPOSE_PRODUCTION_CMD}} up -d --build --remove-orphans'

  'deploy:reset':
    desc: Stop and remove project containers, networks, and volumes (preserves .env.production and repository)
    preconditions:
      - sh: test -f {{.PRODUCTION_ENV_FILE}}
        msg: ".env.production is required. See deploy/README.md."
      - sh: test -f {{.PRODUCTION_COMPOSE_FILE}}
        msg: "{{.PRODUCTION_COMPOSE_FILE}} is required."
    cmds:
      - '{{.COMPOSE_PRODUCTION_CMD}} down --volumes --remove-orphans'

  'deploy:redeploy':
    desc: Reset the production stack and perform a clean deployment
    cmds:
      - task: deploy:reset
      - task: deploy:production

  stop:
    desc: Stop production services without removing containers
    cmds:
      - '{{.COMPOSE_PRODUCTION_CMD}} stop'

  restart:
    desc: Restart production services
    cmds:
      - '{{.COMPOSE_PRODUCTION_CMD}} restart'

  logs:
    desc: Tail production service logs
    cmds:
      - '{{.COMPOSE_PRODUCTION_CMD}} logs -f caddy wikijs postgres'

  status:
    desc: Show production service status
    cmds:
      - '{{.COMPOSE_PRODUCTION_CMD}} ps'

  health:
    desc: Run production health checks
    cmds:
      - bash deploy/scripts/health-check.sh {{.PRODUCTION_ENV_FILE}}

  bootstrap:
    desc: Seed initial wiki content and groups after first boot (requires WIKI_ADMIN_EMAIL and WIKI_ADMIN_PASSWORD)
    preconditions:
      - sh: test -f {{.PRODUCTION_ENV_FILE}}
        msg: ".env.production is required. See deploy/README.md."
    cmds:
      - bash scripts/bootstrap/bootstrap.sh {{.PRODUCTION_ENV_FILE}}
