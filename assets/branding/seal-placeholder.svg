<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Organization seal placeholder">
  <title>Organization Seal — Placeholder</title>
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a6f2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0f111a"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#2d3347" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#gold-grad)" stroke-width="1.5"/>
  <!-- Decorative ring of dots -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="3 6" stroke-opacity="0.5"/>
  <!-- Central shield -->
  <path d="M100,38 L138,52 L138,92 Q138,118 100,132 Q62,118 62,92 L62,52 Z" fill="#1a1f2e" stroke="url(#gold-grad)" stroke-width="1.5"/>
  <!-- Shield inner detail -->
  <path d="M100,50 L126,62 L126,90 Q126,108 100,120 Q74,108 74,90 L74,62 Z" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Placeholder text on shield -->
  <text x="100" y="88" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#c9a84c" text-anchor="middle">ORG</text>
  <text x="100" y="108" font-family="Georgia, serif" font-size="10" font-weight="400" fill="#8a8278" text-anchor="middle">SEAL</text>
  <!-- Bottom text band -->
  <text x="100" y="168" font-family="Georgia, serif" font-size="10" font-weight="400" fill="#8a8278" text-anchor="middle" letter-spacing="3">ORGANIZATION</text>
</svg>
