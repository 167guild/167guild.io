<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="167 Guild Wiki — README banner">
  <title>167 Guild Wiki</title>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f111a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2335;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a6f2e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0f111a;stop-opacity:0" />
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Base background -->
  <rect width="1200" height="400" fill="url(#bg-grad)"/>
  <rect width="1200" height="400" fill="url(#glow-center)"/>
  <!-- Top and bottom borders -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#gold-grad)" opacity="0.6"/>
  <rect x="0" y="397" width="1200" height="3" fill="url(#gold-grad)" opacity="0.6"/>
  <!-- Decorative side lines -->
  <line x1="60" y1="0" x2="60" y2="400" stroke="#2d3347" stroke-width="1"/>
  <line x1="1140" y1="0" x2="1140" y2="400" stroke="#2d3347" stroke-width="1"/>
  <!-- Left hex emblem -->
  <polygon points="130,152 158,136 186,152 186,184 158,200 130,184" fill="none" stroke="url(#gold-grad)" stroke-width="2" filter="url(#glow-filter)"/>
  <text x="158" y="173" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#c9a84c" text-anchor="middle">167</text>
  <!-- Right decorative hex -->
  <polygon points="1070,152 1042,136 1014,152 1014,184 1042,200 1070,184" fill="none" stroke="#2d3347" stroke-width="1.5"/>
  <text x="1042" y="173" font-family="Georgia, serif" font-size="12" font-weight="400" fill="#5a5650" text-anchor="middle">WIKI</text>
  <!-- Main title -->
  <text x="600" y="175" font-family="Georgia, serif" font-size="72" font-weight="700" fill="url(#gold-grad)" text-anchor="middle" letter-spacing="8">167 GUILD</text>
  <!-- Divider -->
  <line x1="260" y1="210" x2="940" y2="210" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.35"/>
  <!-- Subtitle -->
  <text x="600" y="255" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#8a8278" text-anchor="middle" letter-spacing="8">WIKI</text>
  <!-- Tagline -->
  <text x="600" y="310" font-family="Georgia, serif" font-size="15" font-weight="400" fill="#5a5650" text-anchor="middle" letter-spacing="2">A self-hosted knowledge world for the 167 Guild D&amp;D campaign</text>
  <!-- Tech stack strip -->
  <rect x="0" y="358" width="1200" height="42" fill="#1a1f2e" opacity="0.6"/>
  <text x="600" y="385" font-family="system-ui, sans-serif" font-size="12" fill="#5a5650" text-anchor="middle" letter-spacing="4">WIKI.JS · POSTGRESQL · CADDY · DOCKER</text>
</svg>
