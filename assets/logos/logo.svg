<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="167 Guild Wiki logo">
  <title>167 Guild Wiki</title>
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a6f2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="320" height="80" fill="#0f111a" rx="4"/>
  <!-- Logomark hex -->
  <polygon points="32,12 52,12 62,28 52,44 32,44 22,28" fill="none" stroke="url(#gold-gradient)" stroke-width="1.5"/>
  <text x="37" y="32" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#c9a84c" text-anchor="middle">167</text>
  <!-- Divider -->
  <line x1="72" y1="16" x2="72" y2="48" stroke="#2d3347" stroke-width="1"/>
  <!-- Text -->
  <text x="84" y="28" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#c9a84c" letter-spacing="2">167 GUILD</text>
  <text x="84" y="46" font-family="Georgia, serif" font-size="11" font-weight="400" fill="#8a8278" letter-spacing="4">WIKI</text>
</svg>
