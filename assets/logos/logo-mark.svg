<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="167 Guild logomark">
  <title>167 Guild</title>
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a6f2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" fill="#0f111a" rx="8"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#2d3347" stroke-width="1"/>
  <!-- Hexagon -->
  <polygon points="32,8 52,20 52,44 32,56 12,44 12,20" fill="none" stroke="url(#gold-gradient)" stroke-width="1.5"/>
  <!-- Inner mark -->
  <text x="32" y="38" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#c9a84c" text-anchor="middle">167</text>
</svg>
