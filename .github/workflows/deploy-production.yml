name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to deploy (default: main)'
        required: false
        default: 'main'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy production stack
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            DEPLOY_REF="${{ github.event.inputs.ref || github.ref_name }}"
            # Validate ref: allow only alphanumeric characters, dots, slashes, hyphens, and underscores
            if ! echo "$DEPLOY_REF" | grep -qE '^[a-zA-Z0-9_./-]+$'; then
              echo "Invalid ref format: $DEPLOY_REF" >&2
              exit 1
            fi
            cd /opt/167guild.io
            git fetch --tags origin
            git checkout "$DEPLOY_REF"
            # Pull only if deploying a branch (remote tracking ref exists); skip for tags
            if git rev-parse --verify "refs/remotes/origin/$DEPLOY_REF" >/dev/null 2>&1; then
              git pull origin "$DEPLOY_REF" --ff-only
            fi
            task deploy:production
            task health
